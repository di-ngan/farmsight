services:
  farmsight:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEE_SERVICE_ACCOUNT_EMAIL=${GEE_SERVICE_ACCOUNT_EMAIL}
      - GEE_SERVICE_ACCOUNT_KEY_PATH=/secrets/gee-key.json
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ${GEE_SERVICE_ACCOUNT_KEY_PATH}:/secrets/gee-key.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
